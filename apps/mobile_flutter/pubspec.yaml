name: linksnap_mobile
description: LinkSnap Flutter Mobile App - GoPay Merch Premium Edition
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.10.0
  flutter: ^3.38.0

dependencies:
  flutter:
    sdk: flutter
  go_router: ^14.0.0
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0
  dio: ^5.4.0
  flutter_secure_storage: ^9.2.0
  flutter_dotenv: ^5.1.0
  google_fonts: ^6.2.0
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  flutter_svg: ^2.0.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.0.0
  fl_chart: ^0.69.0
  share_plus: ^9.0.0
  url_launcher: ^6.2.0
  intl: ^0.19.0
  json_annotation: ^4.8.0
  freezed_annotation: ^2.4.0
  cached_network_image: ^3.3.0
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  freezed: ^2.5.0
  json_serializable: ^6.7.0
  riverpod_generator: ^2.4.0
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env.example
    - assets/images/
