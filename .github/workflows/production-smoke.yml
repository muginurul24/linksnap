name: Production Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: read

concurrency:
  group: production-smoke
  cancel-in-progress: true

jobs:
  smoke:
    name: Production smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Smoke production
        env:
          BASE_URL: https://www.justqiu.cloud
          APEX_URL: https://justqiu.cloud
        run: bash scripts/smoke-production.sh
