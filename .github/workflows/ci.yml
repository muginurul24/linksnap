name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://postgres:postgres@localhost:5432/linksnap' }}
  AUTH_SECRET: ${{ secrets.AUTH_SECRET || 'ci-auth-secret-must-be-at-least-32-characters' }}
  AUTH_GOOGLE_ID: ${{ secrets.AUTH_GOOGLE_ID || 'ci-google-client-id' }}
  AUTH_GOOGLE_SECRET: ${{ secrets.AUTH_GOOGLE_SECRET || 'ci-google-client-secret' }}
  UPSTASH_REDIS_URL: ${{ secrets.UPSTASH_REDIS_URL || 'https://ci-upstash.example.com' }}
  UPSTASH_REDIS_TOKEN: ${{ secrets.UPSTASH_REDIS_TOKEN || 'ci-upstash-token' }}
  RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || 're_ci_placeholder' }}
  MIDTRANS_SERVER_KEY: ${{ secrets.MIDTRANS_SERVER_KEY || 'SB-Mid-server-ci-placeholder' }}
  MIDTRANS_CLIENT_KEY: ${{ secrets.MIDTRANS_CLIENT_KEY || 'SB-Mid-client-ci-placeholder' }}
  MIDTRANS_MERCHANT_ID: ${{ secrets.MIDTRANS_MERCHANT_ID || 'ci-merchant' }}
  NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL || 'http://localhost:3000' }}
  NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'http://localhost:3000/api/v1' }}
  MAXMIND_LICENSE_KEY: ${{ secrets.MAXMIND_LICENSE_KEY || 'ci-maxmind-placeholder' }}
  USD_IDR_RATE: ${{ vars.USD_IDR_RATE || '16000' }}

jobs:
  verify:
    name: Lint, Typecheck, Test, Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: Install Playwright browsers
        if: vars.RUN_E2E == 'true'
        run: bunx playwright install --with-deps chromium

      - name: E2E tests
        if: vars.RUN_E2E == 'true'
        run: bun run test:e2e

      - name: Trigger Vercel deployment hook
        if: github.ref == 'refs/heads/main'
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL is not configured; skipping deployment hook."
            exit 0
          fi

          curl -fsS -X POST "$VERCEL_DEPLOY_HOOK_URL"
